version: "3.8"

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flaskai
    depends_on:
      db:
        condition: service_healthy

    frontend:
      build: ./frontend
      restart: unless-stopped
      ports:
        - "5173:80"
      depends_on:
        - backend
