version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: flaskai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flaskai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./datasets/users.sql:/docker-entrypoint-initdb.d/01_users.sql:ro
      - ./datasets/jobs.sql:/docker-entrypoint-initdb.d/02_jobs.sql:ro
      - ./datasets/files.sql:/docker-entrypoint-initdb.d/03_files.sql:ro
      - ./datasets/step_metrics.sql:/docker-entrypoint-initdb.d/04_step_metrics.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d flaskai" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dashboard_net

  backend:
    build: ./backend
    container_name: flaskai_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flaskai
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dashboard_net

  frontend:
    build: ./frontend
    container_name: flaskai_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - dashboard_net

networks:
  dashboard_net:
    driver: bridge

volumes:
  pgdata:
