version: "3.8"

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flaskai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./datasets/users.sql:/docker-entrypoint-initdb.d/01_users.sql:ro
      - ./datasets/jobs.sql:/docker-entrypoint-initdb.d/02_jobs.sql:ro
      - ./datasets/files.sql:/docker-entrypoint-initdb.d/03_files.sql:ro
      - ./datasets/step_metrics.sql:/docker-entrypoint-initdb.d/04_step_metrics.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d flaskai" ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flaskai
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  pgdata:
