version: "3.8"

services:

  # ---------------- DATABASE ----------------
  db:
    image: postgres:16-alpine
    container_name: flaskai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flaskai
    volumes:
      - pgdata:/var/lib/postgresql/data

      # ✅ SEED DATA (IMPORTANT)
      - ./datasets/users.sql:/docker-entrypoint-initdb.d/01_users.sql:ro
      - ./datasets/jobs.sql:/docker-entrypoint-initdb.d/02_jobs.sql:ro
      - ./datasets/files.sql:/docker-entrypoint-initdb.d/03_files.sql:ro
      - ./datasets/step_metrics.sql:/docker-entrypoint-initdb.d/04_step_metrics.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flaskai"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - dashboard_net


  # ---------------- BACKEND ----------------
  backend:
    build: ./backend
    container_name: flaskai_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flaskai

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"   # ✅ access backend directly

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - dashboard_net


  # ---------------- FRONTEND ----------------
  frontend:
    build: ./frontend
    container_name: flaskai_frontend
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "3000:80"   # ✅ access UI

    networks:
      - dashboard_net


# ---------------- NETWORK ----------------
networks:
  dashboard_net:
    driver: bridge


# ---------------- VOLUME ----------------
volumes:
  pgdata:
